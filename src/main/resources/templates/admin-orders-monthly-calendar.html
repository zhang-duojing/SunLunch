<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>月別集計</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            background: #f9fafb;
            padding: 28px;
            border-radius: 18px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .sub-text {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .search-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
        }

        .search-area input[type="month"] {
            padding: 11px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }

        .search-btn {
            padding: 11px 18px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        .search-btn:hover {
            background: #2f80ed;
        }

        .action-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            display: inline-block;
            padding: 11px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.25s;
        }

        .main-btn {
            background: #4facfe;
            color: white;
        }

        .main-btn:hover {
            background: #2f80ed;
        }

        .sub-btn {
            background: #f1f3f5;
            color: #555;
        }

        .sub-btn:hover {
            background: #e0e0e0;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .day-name {
            background: #4facfe;
            color: white;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .day-cell {
            background: #f9fafb;
            min-height: 120px;
            padding: 14px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.10);
            transition: 0.2s;
        }

        .day-cell:hover {
            transform: translateY(-2px);
        }

        .other-month {
            opacity: 0.45;
        }

        .day-number {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
            color: #333;
        }

        .date-link {
            display: inline;
            margin: 0;
            padding: 0;
            background: none;
            color: inherit;
            text-decoration: none;
        }

        .date-link:hover {
            text-decoration: underline;
        }

        .count-label {
            color: #666;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .count {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .calendar {
                grid-template-columns: repeat(2, 1fr);
            }

            .day-name {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .calendar {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 24px auto;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h2>月別集計</h2>
        <p class="sub-text">月ごとの注文数をカレンダー形式で確認できます。</p>

        <form method="get" action="/admin/orders/monthly-calendar" class="search-area">
            <input type="month" name="month" th:value="${selectedMonth}">
            <button type="submit" class="search-btn">検索</button>
        </form>

        <div class="action-links">
            <a href="/admin/orders/monthly" class="action-btn main-btn">月次注文レポート</a>
            <a href="/admin/orders/today" class="action-btn sub-btn">本日の注文</a>
            <a href="/admin/orders/list" class="action-btn sub-btn">注文一覧</a>
            <a href="/home" class="action-btn sub-btn">トップページ</a>
        </div>
    </div>

    <div class="calendar">
        <div class="day-name">日</div>
        <div class="day-name">月</div>
        <div class="day-name">火</div>
        <div class="day-name">水</div>
        <div class="day-name">木</div>
        <div class="day-name">金</div>
        <div class="day-name">土</div>

        <div th:each="day : ${calendarDays}"
             class="day-cell"
             th:classappend="${!day.currentMonth} ? 'other-month' : ''">

            <div class="day-number">
                <a class="date-link"
                   th:href="@{/admin/orders/list(date=${day.date})}"
                   th:text="${day.dayNumber}"></a>
            </div>

            <div class="count-label">注文数量</div>
            <div class="count"><span th:text="${day.orderCount}"></span></div>
        </div>
    </div>

</div>

</body>
<script>
    (function () {
        window.addEventListener("pageshow", function (event) {
            var nav = performance.getEntriesByType("navigation");
            var isBackForward = nav.length > 0 && nav[0].type === "back_forward";
            if (event.persisted || isBackForward) {
                window.location.reload();
            }
        });
    })();
</script>
<script src="/js/admin-session-check.js"></script>
</html>
