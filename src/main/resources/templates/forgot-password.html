<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>パスワード再設定</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 400px;
            padding: 35px 30px;
            background: #f9fafb;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .desc {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;
            background: white;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2f80ed;
        }

        .message {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .error {
            color: #c62828;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            font-size: 14px;
            color: #2f80ed;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>パスワード再設定</h2>

        <p class="desc">
            メールアドレスと認証コードを入力し、新しいパスワードを設定してください。
        </p>

        <p th:if="${message}" th:text="${message}" class="message"></p>
        <p th:if="${error}" th:text="${error}" class="error"></p>
        <form method="post">

            <label for="email">メールアドレス</label>
            <input type="email" name="email" id="email" th:value="${email}" required>

            <button type="submit" formaction="/generate-token">
                認証コードを発行
            </button>

            <hr>

            <label>認証コード</label>
            <input type="text" name="token">

            <label>新しいパスワード</label>
            <input type="password" name="newPassword">

            <button type="submit" formaction="/forgot-password">
                パスワードを再設定
            </button>

        </form>

        <div class="link">
            <a href="/login">ログイン画面に戻る</a>
        </div>
    </div>

</body>

</html>
