<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>プロフィール</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            background: #f9fafb;
            padding: 28px;
            border-radius: 18px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .sub-text {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .action-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            display: inline-block;
            padding: 11px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.25s;
        }

        .sub-btn {
            background: #f1f3f5;
            color: #555;
        }

        .sub-btn:hover {
            background: #e0e0e0;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background: #f9fafb;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 18px;
            color: #333;
            font-size: 22px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            margin-bottom: 18px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.4);
        }

        .readonly {
            background: #eeeeee;
            color: #666;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        .save-btn:hover {
            background: #2f80ed;
        }

        .message {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .error {
            color: #c62828;
            background: #ffebee;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 24px auto;
                padding: 15px;
            }
        }

        .password-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 18px;
        }

        .password-wrapper input {
            margin-bottom: 0;
            padding-right: 42px;
        }

        .toggle-btn {
            display: none;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);

            width: 24px;
            height: 24px;
            padding: 0;
            margin: 0;

            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            outline: none;
            color: #666;

            /* display: flex; */
            align-items: center;
            justify-content: center;

            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        .toggle-btn:hover,
        .toggle-btn:focus,
        .toggle-btn:active {
            background: transparent;
            border: none;
            box-shadow: none;
            outline: none;
            color: #666;
        }

        .toggle-btn.show {
            display: flex;
        }

        /*ブラウザ持つパスワード表示機能閉じる*/
        input::-ms-reveal {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h2>プロフィール</h2>
            <p class="sub-text">登録情報の確認・更新を行うことができます。</p>

            <div class="action-links">
                <a href="/home" class="action-btn sub-btn">トップページ</a>
            </div>
        </div>

        <div class="profile-grid">

            <div class="card">
                <h3>基本情報</h3>

                <p th:if="${message}" th:text="${message}" class="message"></p>

                <form method="post" action="/profile">
                    <label for="name">名前</label>
                    <input id="name" name="name" type="text" th:value="${user.name}" required>

                    <label for="email">メールアドレス</label>
                    <input id="email" type="email" th:value="${user.email}" class="readonly" readonly>

                    <button type="submit" class="save-btn">プロフィールを更新</button>
                </form>
            </div>

            <div class="card">
                <h3>パスワード変更</h3>

                <p th:if="${error}" th:text="${error}" class="error"></p>
                <p th:if="${passwordMessage}" th:text="${passwordMessage}" class="message"></p>

                <form method="post" action="/profile/password">
                    <label for="oldPassword">現在のパスワード</label>
                    <div class="password-wrapper">
                        <input id="oldPassword" name="oldPassword" type="password" required>
                        <button type="button" id="toggleOld" class="toggle-btn">👀</button>
                    </div>

                    <label for="newPassword">新しいパスワード</label>
                    <div class="password-wrapper">
                        <input id="newPassword" name="newPassword" type="password" required>
                        <button type="button" id="toggleNew" class="toggle-btn">👀</button>
                    </div>

                    <button type="submit" class="save-btn">パスワードを変更</button>
                </form>
            </div>

        </div>

    </div>

</body>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        function setupPasswordToggle(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);

            function updateButton() {
                if (input.value.length > 0) {
                    button.classList.add("show");
                } else {
                    button.classList.remove("show");
                    input.type = "password";
                    button.textContent = "👁️";
                }
            }

            button.addEventListener("click", function () {
                if (input.type === "password") {
                    input.type = "text";
                    button.textContent = "🙈";
                } else {
                    input.type = "password";
                    button.textContent = "👁️";
                }
            });

            input.addEventListener("input", updateButton);
            updateButton();
        }

        setupPasswordToggle("oldPassword", "toggleOld");
        setupPasswordToggle("newPassword", "toggleNew");
    });
    (function () {
        window.addEventListener("pageshow", function (event) {
            var nav = performance.getEntriesByType("navigation");
            var isBackForward = nav.length > 0 && nav[0].type === "back_forward";
            if (event.persisted || isBackForward) {
                window.location.reload();
            }
        });
    })();
</script>

</html>
