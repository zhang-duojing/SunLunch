<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>注文締切時刻設定</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        .panel {
            background: #f9fafb;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            padding: 28px;
        }

        h2 {
            margin: 0;
            color: #333;
        }

        .sub-text {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .message {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .error {
            color: #c62828;
            background: #ffebee;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .setting-form {
            margin-top: 22px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .setting-form input[type="time"] {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        .save-btn {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            background: #4facfe;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #2f80ed;
        }

        .action-links {
            margin-top: 22px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            background: #f1f3f5;
            color: #555;
        }

        .action-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2>注文締切時刻設定</h2>
        <p class="sub-text">ここで設定した時刻が、当日の注文締切として反映されます。</p>

        <p th:if="${message}" th:text="${message}" class="message"></p>
        <p th:if="${error}" th:text="${error}" class="error"></p>

        <form class="setting-form" method="post" action="/admin/order-settings">
            <label for="orderDeadline">締切時刻</label>
            <input id="orderDeadline" type="time" name="orderDeadline" th:value="${orderDeadline}" required>
            <button class="save-btn" type="submit">更新する</button>
        </form>

        <div class="action-links">
            <a class="action-btn" href="/admin/menu/list">メニュー管理へ</a>
            <a class="action-btn" href="/admin/orders/today">本日の注文一覧へ</a>
            <a class="action-btn" href="/home">トップページへ</a>
        </div>
    </div>
</div>

</body>
<script>
    (function () {
        window.addEventListener("pageshow", function (event) {
            var nav = performance.getEntriesByType("navigation");
            var isBackForward = nav.length > 0 && nav[0].type === "back_forward";
            if (event.persisted || isBackForward) {
                window.location.reload();
            }
        });
    })();
</script>
</html>
