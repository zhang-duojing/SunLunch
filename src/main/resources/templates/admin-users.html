<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
     <title>ユーザー管理</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            background: #f9fafb;
            padding: 28px;
            border-radius: 18px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .sub-text {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .message {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .error {
            color: #c62828;
            background: #ffebee;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .action-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            display: inline-block;
            padding: 11px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.25s;
            background: #f1f3f5;
            color: #555;
        }

        .action-btn:hover {
            background: #e0e0e0;
        }

        .search-wrap {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            background: #f3f6fa;
            border: 1px solid #e2e8f0;
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            flex: 1 1 280px;
            max-width: 420px;
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            background: #fff;
        }

        .search-btn {
            background: #4facfe;
            color: #fff;
        }

        .search-btn:hover {
            background: #2f80ed;
        }

        .clear-btn {
            background: #edf2f7;
            color: #4a5568;
        }

        .clear-btn:hover {
            background: #e2e8f0;
        }

        .section-wrap {
            margin-top: 18px;
            background: #f9fafb;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
            padding: 18px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-title {
            margin: 0;
            font-size: 19px;
            color: #2d3748;
        }

        .section-count {
            font-size: 14px;
            color: #4a5568;
            margin-left: 8px;
        }

        .toggle-btn {
            background: #edf2f7;
            color: #4a5568;
        }

        .toggle-btn:hover {
            background: #e2e8f0;
        }

        .table-wrap {
            padding: 0;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 840px;
        }

        th, td {
            border-bottom: 1px solid #e6e6e6;
            padding: 12px 10px;
            text-align: left;
            font-size: 14px;
            color: #333;
        }

        th {
            background: #eef2f7;
            font-weight: bold;
        }

        .role-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .role-select {
            padding: 7px 9px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            font-size: 13px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn {
            background: #4facfe;
            color: #fff;
        }

        .save-btn:hover {
            background: #2f80ed;
        }

        .delete-btn {
            background: #ffe5e5;
            color: #c62828;
        }

        .delete-btn:hover {
            background: #ffcccc;
        }

        .myself-label {
            font-size: 12px;
            color: #777;
        }

        .empty-message {
            color: #718096;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>ユーザー管理</h2>
        <p class="sub-text">ユーザーの権限変更と削除を実行できます。</p>

        <p th:if="${message}" th:text="${message}" class="message"></p>
        <p th:if="${error}" th:text="${error}" class="error"></p>

        <div class="action-links">
            <a class="action-btn" href="/home">トップページ</a>
            <a class="action-btn" href="/admin/menu/list">メニュー管理</a>
            <a class="action-btn" href="/admin/order-settings">注文締切時刻設定</a>
        </div>

        <div class="search-wrap">
            <form class="search-form" method="get" action="/admin/users">
                <input class="search-input" type="text" name="keyword" th:value="${keyword}"
                       placeholder="名前またはメールアドレスで検索">
                <button class="btn search-btn" type="submit">検索</button>
                <button class="btn clear-btn" type="button" onclick="window.location.href='/admin/users'">クリア</button>
            </form>
        </div>
    </div>

    <div class="section-wrap">
        <div class="section-header">
            <h3 class="section-title">
                管理者ユーザー
                <span class="section-count" th:text="|(${#lists.size(adminUsers)}人)|"></span>
            </h3>
            <button type="button" class="btn toggle-btn section-toggle" data-target="admin-user-section">閉じる</button>
        </div>
        <div id="admin-user-section" class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名前</th>
                    <th>メールアドレス</th>
                    <th>現在の権限</th>
                    <th>権限変更</th>
                    <th>削除</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(adminUsers)}">
                    <td colspan="6" class="empty-message">該当する管理者ユーザーはいません。</td>
                </tr>
                <tr th:each="u : ${adminUsers}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.name}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td>
                        <form class="role-form" method="post" action="/admin/users/role">
                            <input type="hidden" name="userId" th:value="${u.id}">
                            <select class="role-select" name="role">
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${u.role == r}"></option>
                            </select>
                            <button class="btn save-btn" type="submit">更新</button>
                        </form>
                    </td>
                    <td>
                        <form class="delete-form" method="post" action="/admin/users/delete">
                            <input type="hidden" name="userId" th:value="${u.id}">
                            <button class="btn delete-btn" type="submit" th:attr="data-self=${u.id == loginUserId}">削除</button>
                            <span class="myself-label" th:if="${u.id == loginUserId}">（自分）</span>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section-wrap">
        <div class="section-header">
            <h3 class="section-title">
                一般ユーザー
                <span class="section-count" th:text="|(${#lists.size(normalUsers)}人)|"></span>
            </h3>
            <button type="button" class="btn toggle-btn section-toggle" data-target="normal-user-section">開く</button>
        </div>
        <div id="normal-user-section" class="table-wrap" style="display:none;">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名前</th>
                    <th>メールアドレス</th>
                    <th>現在の権限</th>
                    <th>権限変更</th>
                    <th>削除</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(normalUsers)}">
                    <td colspan="6" class="empty-message">該当する一般ユーザーはいません。</td>
                </tr>
                <tr th:each="u : ${normalUsers}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.name}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td>
                        <form class="role-form" method="post" action="/admin/users/role">
                            <input type="hidden" name="userId" th:value="${u.id}">
                            <select class="role-select" name="role">
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${u.role == r}"></option>
                            </select>
                            <button class="btn save-btn" type="submit">更新</button>
                        </form>
                    </td>
                    <td>
                        <form class="delete-form" method="post" action="/admin/users/delete">
                            <input type="hidden" name="userId" th:value="${u.id}">
                            <button class="btn delete-btn" type="submit" th:attr="data-self=${u.id == loginUserId}">削除</button>
                            <span class="myself-label" th:if="${u.id == loginUserId}">（自分）</span>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/admin-session-check.js"></script>
</body>
<script>
    (function () {
        window.addEventListener("pageshow", function (event) {
            var nav = performance.getEntriesByType("navigation");
            var isBackForward = nav.length > 0 && nav[0].type === "back_forward";
            if (event.persisted || isBackForward) {
                window.location.reload();
            }
        });
    })();

    (function () {
        var toggleButtons = document.querySelectorAll(".section-toggle");
        toggleButtons.forEach(function (button) {
            button.addEventListener("click", function () {
                var targetId = button.getAttribute("data-target");
                var section = document.getElementById(targetId);
                if (!section) {
                    return;
                }

                var isHidden = section.style.display === "none";
                section.style.display = isHidden ? "block" : "none";
                button.textContent = isHidden ? "閉じる" : "開く";
            });
        });
    })();

    (function () {
        var deleteForms = document.querySelectorAll(".delete-form");
        deleteForms.forEach(function (form) {
            form.addEventListener("submit", function (event) {
                var button = form.querySelector(".delete-btn");
                var isSelf = button && button.getAttribute("data-self") === "true";

                if (isSelf) {
                    alert("自分自身は削除できません。");
                    event.preventDefault();
                    return;
                }

                if (!confirm("このユーザーを削除します。よろしいですか？")) {
                    event.preventDefault();
                }
            });
        });
    })();
</script>
</html>
