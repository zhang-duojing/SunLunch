<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メニュー管理</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            background: #f9fafb;
            padding: 28px;
            border-radius: 18px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .sub-text {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .error-message {
            color: #c62828;
            background: #ffebee;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        .success-message {
            color: #1b5e20;
            background: #e8f5e9;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        .sort-form {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-size: 14px;
            color: #444;
        }

        .sort-form select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
        }

        .search-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .search-form input[type="date"] {
            min-width: 220px;
            padding: 9px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
        }

        .search-btn {
            padding: 9px 16px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-btn:hover {
            background: #2f80ed;
        }

        .action-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            display: inline-block;
            padding: 11px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.25s;
            border: none;
        }

        .primary-btn {
            background: #4facfe;
            color: white;
        }

        .primary-btn:hover {
            background: #2f80ed;
        }

        .sub-btn {
            background: #f1f3f5;
            color: #555;
        }

        .sub-btn:hover {
            background: #e0e0e0;
        }

        .sync-btn {
            background: #d9efe5;
            color: #1e5f46;
            border: 1px solid #b8dfcf;
            outline: none;
            box-shadow: none;
        }

        .sync-btn:hover {
            background: #cde8dc;
            color: #184f3a;
        }

        .sync-btn:focus,
        .sync-btn:focus-visible {
            outline: none;
            box-shadow: none;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .section-title {
            margin: 30px 0 14px;
            font-size: 22px;
            color: #2d3748;
        }

        .section-note {
            margin: 0 0 16px;
            color: #555;
            font-size: 14px;
        }

        .empty-message {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
            color: #666;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .menu-card {
            background: #f9fafb;
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
        }

        .menu-image {
            width: 100%;
            height: 190px;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 6px;
            background: #eef2f7;
            margin-bottom: 14px;
        }

        .menu-card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #333;
            font-size: 22px;
        }

        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.7;
            min-height: 48px;
            margin-bottom: 16px;
        }

        .info-row {
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .price {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .edit-btn,
        .delete-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
        }

        .edit-btn {
            background: #4facfe;
            color: white;
        }

        .edit-btn:hover {
            background: #2f80ed;
        }

        .delete-btn {
            background: #ffe5e5;
            color: #c62828;
        }

        .delete-btn:hover {
            background: #ffcccc;
        }

        form {
            margin: 0;
        }

        .sync-form {
            display: inline;
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 24px auto;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-top">
            <h2>メニュー管理</h2>
        </div>

        <p class="sub-text">初期表示は今週のメニューです。日付を選ぶと、その日のメニューに切り替わります。</p>

        <p th:if="${message}" th:text="${message}" class="success-message"></p>
        <p th:if="${error}" th:text="${error}" class="error-message"></p>

        <form class="sort-form" method="get" action="/admin/menu/list">
            <label for="sort">並び順:</label>
            <select id="sort" name="sort" onchange="this.form.submit()">
                <option value="dateAsc" th:selected="${sort == 'dateAsc'}">日付の古い順</option>
                <option value="dateDesc" th:selected="${sort == 'dateDesc'}">日付の新しい順</option>
            </select>
            <input type="hidden" name="searchDate" th:value="${searchDate}">
        </form>

        <form class="search-form" method="get" action="/admin/menu/list">
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="date" name="searchDate" th:value="${searchDate}">
            <button class="search-btn" type="submit">日付で表示</button>
            <a class="action-btn sub-btn" th:href="@{/admin/menu/list(sort=${sort})}">今週表示に戻す</a>
        </form>

        <div class="action-links">
            <a class="action-btn primary-btn" href="/admin/menu/new">新規メニューを追加</a>
            <form class="sync-form" th:action="@{/admin/menu/sync}" method="post">
                <input type="hidden" name="sort" th:value="${sort}">
                <input type="hidden" name="searchDate" th:value="${searchDate}">
                <button type="submit" class="action-btn sync-btn">便当店サイトから同期</button>
            </form>
            <a class="action-btn sub-btn" href="/admin/order-settings">注文締切時刻設定</a>
            <a class="action-btn sub-btn" href="/menu">注文用メニュー</a>
            <a class="action-btn sub-btn" href="/home">トップページ</a>
        </div>
    </div>

    <h3 class="section-title" th:text="${displayTitle}">今週のメニュー</h3>
    <p class="section-note" th:text="${displayNote}"></p>
    <p class="empty-message" th:if="${#lists.isEmpty(displayMenuList)}">
        条件に一致するメニューはありません。
    </p>
    <div class="menu-grid" th:if="${!#lists.isEmpty(displayMenuList)}">
        <div class="menu-card" th:each="menu : ${displayMenuList}">
            <img class="menu-image" th:if="${menu.imagePath != null}" th:src="@{${menu.imagePath}}" alt="menu image">
            <h3 th:text="${menu.menuName}"></h3>

            <p class="description" th:text="${menu.description}"></p>

            <p class="price">￥<span th:text="${menu.price}"></span></p>
            <p class="info-row">提供日: <span th:text="${menu.menuDate}"></span></p>

            <div class="card-actions">
                <a class="edit-btn" th:href="@{/admin/menu/edit(menuId=${menu.id},sort=${sort},searchDate=${searchDate})}">編集</a>

                <form action="/admin/menu/delete" method="post">
                    <input type="hidden" name="menuId" th:value="${menu.id}">
                    <input type="hidden" name="sort" th:value="${sort}">
                    <input type="hidden" name="searchDate" th:value="${searchDate}">
                    <button class="delete-btn" type="submit">削除</button>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
<script>
    (function () {
        window.addEventListener("pageshow", function (event) {
            var nav = performance.getEntriesByType("navigation");
            var isBackForward = nav.length > 0 && nav[0].type === "back_forward";
            if (event.persisted || isBackForward) {
                window.location.reload();
            }
        });
    })();
</script>
</html>
